name: Run Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        type: choice
        description: 'Browser'
        default: chrome
        required: true
        options:
          - chrome
          - firefox
          - safari
          - edge

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Run Tests (${{ inputs.browser }})
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ inputs.browser }}

      - name: Run tests
        run: npm run test:${{ inputs.browser }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  publish_report:
    name: Publish Report to GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true

    env:
      REPORT_PATH: reports/${{ github.ref_name }}/${{ github.run_id }}/${{ github.run_attempt }}

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.REPORT_PATH }}

      - name: Commit and push report
        timeout-minutes: 3
        run: |
          git add .
          git commit -m "ci: add report for run ${{ github.run_id }} (attempt ${{ github.run_attempt }})"

          until git push; do
            git pull --rebase || { echo "Rebase failed. Manual review required."; exit 1; }
          done

      - name: Annotate workflow with report URL
        run: |
          echo "::notice title=📋 Published Playwright Report::https://jay-yeluru.github.io/playwright-demo-js/$REPORT_PATH"